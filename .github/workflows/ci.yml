name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  DATABASE_URL: postgresql://doremi:doremi_dev@localhost:5432/doremi?schema=public
  # CI-only values — production refuses placeholders; these satisfy the length check
  JWT_ACCESS_SECRET: ci-only-access-secret-0123456789abcdefghij
  JWT_REFRESH_SECRET: ci-only-refresh-secret-0123456789abcdefghij
  CHECKPOINT_DISABLE: "1"

jobs:
  checks:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: doremi
          POSTGRES_PASSWORD: doremi_dev
          POSTGRES_DB: doremi
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U doremi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write server env
        run: |
          cat > server/.env <<EOF
          DATABASE_URL="$DATABASE_URL"
          JWT_ACCESS_SECRET=$JWT_ACCESS_SECRET
          JWT_REFRESH_SECRET=$JWT_REFRESH_SECRET
          PORT=4000
          NODE_ENV=development
          CORS_ORIGIN=http://localhost:3000
          EOF

      - name: Migrate & generate Prisma client
        working-directory: server
        run: |
          npx prisma migrate deploy
          npm run db:generate

      - name: Seed database
        run: npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: |
          npm run typecheck -w server
          npm run typecheck -w web

      - name: Unit & integration tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: checks
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: doremi
          POSTGRES_PASSWORD: doremi_dev
          POSTGRES_DB: doremi
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U doremi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write server env
        run: |
          cat > server/.env <<EOF
          DATABASE_URL="$DATABASE_URL"
          JWT_ACCESS_SECRET=$JWT_ACCESS_SECRET
          JWT_REFRESH_SECRET=$JWT_REFRESH_SECRET
          PORT=4000
          NODE_ENV=development
          CORS_ORIGIN=http://localhost:3000
          EOF

      - name: Migrate, generate & seed
        run: |
          (cd server && npx prisma migrate deploy && npm run db:generate)
          npm run db:seed

      - name: Install Playwright Chromium
        run: npx --yes playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start production servers
        run: |
          node --env-file=server/.env server/dist/index.js &
          (cd web && npx next start -p 3000 &)
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health > /dev/null && break
            sleep 2
          done
          curl -sf http://localhost:3000/api/health

      - name: Run E2E flows
        run: node e2e/run.mjs

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: e2e/.artifacts/
          if-no-files-found: ignore
